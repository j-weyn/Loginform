<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login</title>

</head>

<body>
<center>
    
    <!-- Insert this inside <center> but above <h2>LOGIN</h2> -->
<div class="login-picture">
    <img src="logo.png" alt="Profile Picture">
</div>
    
<h2>LOGIN</h2>

<p id="error-message">Incorrect username or password</p>

<form>
<label for="username" id="label1">Username:</label><br />
<input type="text" id="username" name="username" placeholder="Enter username" /><br /><br />

<label for="password" id="label2">Password:</label><br />
<input type="password" id="password" name="password" placeholder="Enter password" /><br /><br />

<input type="checkbox" id="remember" name="remember">
<label for="remember" id="label3">Remember me:</label><br /><br>

<button type="button" id="button1" onclick="checkLogin()">SUBMIT</button><br><br>
<button type="button" id="button2" onclick="clearForm()">CANCEL</button>

</form>

</center>

<style>

/* webpage background */
body{
background-color: black;
font-family: sans-serif;
color: white;
animation: popUp 1s ease-in;
display: flex;
align-items: center;
justify-content: center;
height: 100vh;
margin: 0;
}

/* hide error message first */
#error-message{
display: none;
background-color: red;
padding: 8px;
border-radius: 8px;
margin-bottom: 15px;
}

/* login box */
form{
padding: 40px;
border-radius: 15px;
box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
width: 350px;
text-align: center;
}

/* header */
h2{
margin-bottom: 30px;
color: white;
font-weight: 600;
}

/* username textbox */
#username{
background-color: transparent;
border: 0;
border-bottom: 2px solid white;
padding: 8px;
color: white;
outline: none;
width: 80%;
transition: 0.3s;
}

/* password textbox */
#password{
background-color: transparent;
border: 0;
border-bottom: 2px solid white;
padding: 8px;
color: white;
outline: none;
width: 80%;
transition: 0.3s;
}

/* transform */
#username:hover, #password:hover, #remember:hover{
transform: scale(1.05);
}

/* submit button */
#button1{
background-color: white;
border: none;
padding: 10px 25px;
color: black;
border-radius: 20px;
font-weight: bold;
letter-spacing: 1px;
cursor: pointer;
transition: all 0.3s ease;
}

#button1:hover{
background-color: transparent;
color: white;
border: 2px solid white;
transform: scale(1.05);
}

/* cancel button */
#button2{
background-color: transparent;
border: 2px solid white;
padding: 10px 25px;
color: white;
border-radius: 20px;
cursor: pointer;
transition: all 0.3s ease;
}

#button2:hover{
background-color: white;
color: black;
}

/* checkbox */
#remember{
accent-color: white;
width: 16px;
height: 16px;
cursor: pointer;
transition: transform 0.2s ease;
}

#remember:hover{
transform: scale(1.2);
}
    
    /* Picture container */
.login-picture {
    margin-bottom: 20px;
}

/* Picture styling */
.login-picture img {
    width: 100px;           /* size of the picture */
    height: 100px;
    border-radius: 50%;     /* makes it circular */
    object-fit: cover;      /* ensures image fits nicely */
    box-shadow: 0 4px 10px rgba(255, 255, 255, 0.3); /* subtle glow */
    transition: transform 0.3s ease;
}

.login-picture img:hover {
    transform: scale(1.1);  /* subtle hover effect */
}

</style>

<script>

var correctUsername = "admin";
var correctPassword = "1234";

function checkLogin() {

var enteredUsername = document.getElementById("username").value;
var enteredPassword = document.getElementById("password").value;

if (enteredUsername === correctUsername && enteredPassword === correctPassword) {

window.location.href ="aboutmyself.html";

} else {

document.getElementById("error-message").style.display = "block";

}

}

function clearForm() {

document.getElementById("username").value = "";
document.getElementById("password").value = "";
document.getElementById("error-message").style.display = "none";

}

</script>

</body>
</html>
