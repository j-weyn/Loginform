<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root {
            --bg: #120d0b;
            --bg-deep: #070505;
            --panel: rgba(28, 19, 17, 0.9);
            --panel-soft: rgba(53, 35, 29, 0.72);
            --line: rgba(255, 196, 160, 0.12);
            --text: #f6ede7;
            --muted: #d8c0b2;
            --accent: #ff8a5b;
            --accent-strong: #ff6b3d;
            --accent-soft: #ffc3a5;
            --danger: #ff5b6e;
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--text);
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 107, 61, 0.18), transparent 28%),
                radial-gradient(circle at bottom right, rgba(255, 138, 91, 0.18), transparent 24%),
                linear-gradient(145deg, var(--bg-deep), var(--bg));
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            filter: blur(20px);
            opacity: 0.4;
            pointer-events: none;
            animation: drift 12s ease-in-out infinite alternate;
        }

        body::before {
            width: 220px;
            height: 220px;
            top: 10%;
            left: -60px;
            background: rgba(255, 107, 61, 0.18);
        }

        body::after {
            width: 180px;
            height: 180px;
            bottom: 8%;
            right: -50px;
            background: rgba(255, 172, 125, 0.14);
            animation-duration: 15s;
        }

        .login-shell {
            position: relative;
            width: min(100%, 460px);
            display: block;
            border: 1px solid var(--line);
            border-radius: 32px;
            overflow: hidden;
            background: rgba(12, 8, 7, 0.82);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
            animation: fadeUp 0.9s ease;
        }

        .login-panel {
            padding: 46px 38px 38px;
            background: linear-gradient(180deg, rgba(27, 18, 15, 0.96), rgba(12, 8, 7, 0.98));
        }

        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 18px;
        }

        .logo-wrap img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 28px;
            border: 1px solid rgba(255, 195, 165, 0.16);
            box-shadow: 0 16px 28px rgba(0, 0, 0, 0.35);
            animation: floatLogo 4.6s ease-in-out infinite;
        }

        .login-panel h2 {
            margin: 0 0 8px;
            text-align: center;
            font-size: 1.95rem;
            letter-spacing: 0.04em;
        }

        .subtext {
            margin: 0 0 26px;
            text-align: center;
            color: var(--muted);
        }

        #error-message {
            display: none;
            margin-bottom: 18px;
            padding: 12px 14px;
            border: 1px solid rgba(255, 91, 110, 0.32);
            border-radius: 14px;
            background: rgba(255, 91, 110, 0.12);
            color: #ffd6dc;
            animation: shakeIn 0.35s ease;
        }

        form {
            display: grid;
            gap: 16px;
        }

        .field-group {
            display: grid;
            gap: 8px;
        }

        label {
            color: var(--accent-soft);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 15px 78px 15px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            outline: none;
            background: var(--panel-soft);
            color: var(--text);
            transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: #c8a998;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: rgba(255, 138, 91, 0.5);
            box-shadow: 0 0 0 4px rgba(255, 107, 61, 0.12);
            transform: translateY(-1px);
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            min-width: 56px;
            padding: 7px 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent-soft);
            cursor: pointer;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.03em;
            line-height: 1;
            transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
        }

        .utility-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .remember-wrap {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        #remember {
            accent-color: var(--accent-strong);
            width: 17px;
            height: 17px;
            cursor: pointer;
        }

        .hint {
            color: #c99a84;
            font-size: 0.88rem;
        }

        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 4px;
        }

        button[type="button"] {
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid transparent;
            font-weight: 800;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
        }

        #button1 {
            color: #2c130d;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            box-shadow: 0 14px 24px rgba(255, 107, 61, 0.24);
        }

        #button2 {
            color: var(--text);
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.1);
        }

        #button1:hover,
        #button2:hover {
            transform: translateY(-2px);
        }

        .toggle-password:hover {
            background: rgba(255, 138, 91, 0.1);
            border-color: rgba(255, 138, 91, 0.28);
            color: #ffe2d2;
        }

        #button1:hover {
            box-shadow: 0 18px 30px rgba(255, 107, 61, 0.3);
        }

        #button2:hover {
            border-color: rgba(255, 138, 91, 0.34);
            background: rgba(255, 138, 91, 0.06);
        }

        .login-panel,
        .logo-wrap img,
        .input-wrap,
        .button-row button {
            animation: fadeUp 0.9s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes drift {
            from {
                transform: translate3d(0, 0, 0) scale(1);
            }
            to {
                transform: translate3d(24px, -18px, 0) scale(1.08);
            }
        }

        @keyframes floatLogo {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        @keyframes shakeIn {
            0% {
                opacity: 0;
                transform: translateX(-8px);
            }
            50% {
                transform: translateX(8px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 860px) {
            .login-panel {
                padding: 32px 24px;
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 14px;
            }

            .button-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <section class="login-panel">
            <div class="logo-wrap">
                <img src="logo.png" alt="Logo">
            </div>

            <h2>Login</h2>
            <p class="subtext">Enter your username and password to continue.</p>

            <p id="error-message">Incorrect username or password.</p>

            <form>
                <div class="field-group">
                    <label for="username">Username</label>
                    <div class="input-wrap">
                        <input type="text" id="username" name="username" placeholder="Enter username">
                    </div>
                </div>

                <div class="field-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" name="password" placeholder="Enter password">
                        <button type="button" class="toggle-password" id="togglePassword">Show</button>
                    </div>
                </div>

                <div class="utility-row">
                    <label class="remember-wrap" for="remember">
                        <input type="checkbox" id="remember" name="remember">
                        <span>Remember me</span>
                    </label>
                    <span class="hint">Demo login: admin / 1234</span>
                </div>

                <div class="button-row">
                    <button type="button" id="button1" onclick="checkLogin()">Submit</button>
                    <button type="button" id="button2" onclick="clearForm()">Cancel</button>
                </div>
            </form>
        </section>
    </div>

    <script>
        const correctUsername = "admin";
        const correctPassword = "1234";
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const errorMessage = document.getElementById("error-message");
        const togglePasswordButton = document.getElementById("togglePassword");

        togglePasswordButton.addEventListener("click", function () {
            const isHidden = passwordInput.type === "password";
            passwordInput.type = isHidden ? "text" : "password";
            togglePasswordButton.textContent = isHidden ? "Hide" : "Show";
        });

        passwordInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                checkLogin();
            }
        });

        usernameInput.addEventListener("input", hideError);
        passwordInput.addEventListener("input", hideError);

        function checkLogin() {
            const enteredUsername = usernameInput.value.trim();
            const enteredPassword = passwordInput.value;

            if (enteredUsername === correctUsername && enteredPassword === correctPassword) {
                window.location.href = "aboutmyself.html";
            } else {
                errorMessage.style.display = "block";
            }
        }

        function clearForm() {
            usernameInput.value = "";
            passwordInput.value = "";
            passwordInput.type = "password";
            togglePasswordButton.textContent = "Show";
            document.getElementById("remember").checked = false;
            hideError();
        }

        function hideError() {
            errorMessage.style.display = "none";
        }
    </script>
</body>
</html>
